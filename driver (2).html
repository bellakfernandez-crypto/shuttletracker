<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Driver Panel — Shuttle</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100vh;
    }

    .header {
      background: #0f6e56;
      color: white;
      padding: 18px 20px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-left h1 { font-size: 18px; font-weight: 700; }
    .header-left p { font-size: 12px; opacity: 0.75; margin-top: 2px; }
    .sync-indicator {
      display: flex; align-items: center; gap: 5px;
      font-size: 12px; font-weight: 600;
      background: rgba(255,255,255,0.15);
      padding: 5px 10px; border-radius: 99px;
    }
    .sync-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #a8f0c6;
    }
    .sync-dot.syncing { animation: blink 0.8s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

    .mode-section { padding: 16px 16px 0; }
    .mode-label { font-size: 12px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 8px; }
    .mode-toggle {
      display: flex; gap: 8px;
      background: white;
      border-radius: 12px;
      padding: 6px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .mode-btn {
      flex: 1; padding: 10px 8px;
      border-radius: 8px; border: none;
      font-size: 14px; font-weight: 600;
      cursor: pointer; background: transparent;
      color: #888; transition: all 0.2s;
    }
    .mode-btn.active { background: #0f6e56; color: white; }

    .gps-status {
      background: white;
      margin: 12px 16px 0;
      border-radius: 12px;
      padding: 14px 16px;
      font-size: 13px;
      color: #555;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      display: none;
      align-items: center;
      gap: 10px;
    }
    .gps-icon { font-size: 20px; }
    .gps-text { flex: 1; }
    .gps-text strong { display: block; font-size: 14px; color: #1a1a1a; }

    .stops-section { padding: 16px 16px 0; }
    .stops-card {
      background: white;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .driver-stop {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px;
      border-bottom: 1px solid #f3f3f3;
      transition: background 0.15s;
    }
    .driver-stop:last-child { border-bottom: none; }
    .driver-stop.done { opacity: 0.4; }
    .driver-stop.current { background: #f0faf5; }

    .ds-num {
      width: 32px; height: 32px; border-radius: 50%;
      background: #f0f0f0; color: #999;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700; flex-shrink: 0;
    }
    .driver-stop.done .ds-num { background: #1D9E75; color: white; }
    .driver-stop.current .ds-num { background: #185FA5; color: white; box-shadow: 0 0 0 3px #b5d4f4; }

    .ds-info { flex: 1; }
    .ds-name { font-size: 15px; font-weight: 500; color: #1a1a1a; }
    .ds-sub { font-size: 12px; color: #999; margin-top: 1px; }

    .ds-tag {
      font-size: 12px; font-weight: 600;
      padding: 4px 10px; border-radius: 99px;
    }
    .tag-done { background: #f0f0f0; color: #999; }
    .tag-current { background: #185FA5; color: white; }
    .tag-next { background: #e1f5ee; color: #0f6e56; }

    .arrive-section { padding: 16px; }
    .arrive-btn {
      width: 100%;
      background: #0f6e56;
      color: white;
      border: none;
      border-radius: 14px;
      padding: 18px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 4px 12px rgba(15,110,86,0.3);
      transition: all 0.15s;
    }
    .arrive-btn:active { transform: scale(0.98); opacity: 0.9; }
    .arrive-btn:disabled { background: #ccc; box-shadow: none; cursor: default; }

    .restart-btn {
      width: 100%;
      background: white;
      color: #0f6e56;
      border: 2px solid #0f6e56;
      border-radius: 14px;
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 10px;
      display: none;
    }

    .sync-status {
      text-align: center;
      font-size: 12px;
      color: #bbb;
      padding: 4px 0 24px;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Driver Panel</h1>
    <p>Paradise Resort — Beach Loop</p>
  </div>
  <div class="sync-indicator">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncText">Live</span>
  </div>
</div>

<div class="mode-section">
  <div class="mode-label">Tracking Mode</div>
  <div class="mode-toggle">
    <button class="mode-btn active" id="btnManual" onclick="setMode('manual')">✋ Manual Tap</button>
    <button class="mode-btn" id="btnGps" onclick="setMode('gps')">📍 Auto GPS</button>
  </div>
</div>

<div class="gps-status" id="gpsStatus">
  <div class="gps-icon">📡</div>
  <div class="gps-text">
    <strong id="gpsTitle">Acquiring GPS signal...</strong>
    <span id="gpsSub">Keep this page open while driving</span>
  </div>
</div>

<div class="stops-section">
  <div class="mode-label" style="margin-bottom:8px">Stops</div>
  <div class="stops-card" id="driverStops"></div>
</div>

<div class="arrive-section">
  <button class="arrive-btn" id="arriveBtn" onclick="markArrived()">
    <span>✓</span> <span id="arriveBtnText">Mark Arrived</span>
  </button>
  <button class="restart-btn" id="restartBtn" onclick="restartLoop()">↺ Restart Loop from Main Lobby</button>
</div>

<div class="sync-status" id="syncStatus">Waiting to sync...</div>

<script>
  // ─── REPLACE THIS WITH YOUR FIREBASE URL ───
  const FIREBASE_URL = "https://resort-shuttle-try-default-rtdb.firebaseio.com/shuttle.json";
  // ───────────────────────────────────────────

  const stops = [
    { name: "Main Lobby",     sub: "Main entrance & drop-off" },
    { name: "Pool & Cabanas", sub: "Poolside bar & loungers"  },
    { name: "Spa & Wellness", sub: "Building B, north side"   },
    { name: "Beach Club",     sub: "Oceanfront access"        },
    { name: "Water Sports",   sub: "Kayaks & paddleboards"    },
    { name: "Garden Villas",  sub: "Rooms 200-350"            },
    { name: "Restaurant Row", sub: "Dining & beach bar"       },
  ];

  // ─── REPLACE WITH YOUR REAL GPS COORDINATES ───
  // To get coordinates: open Google Maps, long-press each stop location,
  // coordinates appear at the bottom of the screen.
  const stopCoords = [
    { lat: 25.7617, lng: -80.1918 },
    { lat: 25.7622, lng: -80.1910 },
    { lat: 25.7628, lng: -80.1903 },
    { lat: 25.7635, lng: -80.1895 },
    { lat: 25.7641, lng: -80.1888 },
    { lat: 25.7638, lng: -80.1878 },
    { lat: 25.7629, lng: -80.1870 },
  ];
  // ──────────────────────────────────────────────

  let currentStop = 0;
  let mode = "manual";
  let gpsInterval = null;

  function loadCurrentStop() {
    fetch(FIREBASE_URL)
      .then(r => r.json())
      .then(data => {
        if (data && typeof data.stop === "number") {
          currentStop = data.stop;
          renderPanel();
        }
      })
      .catch(() => setSyncStatus("Could not load — check connection"));
  }

  function pushStop(stopNum) {
    setSyncing(true);
    fetch(FIREBASE_URL, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ stop: stopNum, updated: Date.now() })
    })
    .then(() => {
      setSyncing(false);
      const now = new Date();
      setSyncStatus("Synced at " + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' }));
    })
    .catch(() => {
      setSyncing(false);
      setSyncStatus("Sync failed — check connection");
    });
  }

  function setSyncing(on) {
    const dot = document.getElementById("syncDot");
    const text = document.getElementById("syncText");
    dot.className = "sync-dot" + (on ? " syncing" : "");
    text.textContent = on ? "Syncing..." : "Live";
  }

  function setSyncStatus(msg) {
    document.getElementById("syncStatus").textContent = msg;
  }

  function renderPanel() {
    const next = (currentStop + 1) % stops.length;
    const isLast = currentStop >= stops.length - 1;

    document.getElementById("driverStops").innerHTML = stops.map((s, i) => {
      let rowClass = "driver-stop";
      let tag = "";

      if (i < currentStop) {
        rowClass += " done"; tag = '<span class="ds-tag tag-done">Done</span>';
      } else if (i === currentStop) {
        rowClass += " current"; tag = '<span class="ds-tag tag-current">Here</span>';
      } else if (i === next) {
        tag = '<span class="ds-tag tag-next">Next</span>';
      }

      return '<div class="' + rowClass + '">' +
        '<div class="ds-num">' + (i + 1) + '</div>' +
        '<div class="ds-info">' +
          '<div class="ds-name">' + s.name + '</div>' +
          '<div class="ds-sub">' + s.sub + '</div>' +
        '</div>' +
        tag +
        '</div>';
    }).join("");

    const arriveBtn = document.getElementById("arriveBtn");
    const restartBtn = document.getElementById("restartBtn");
    const arriveBtnText = document.getElementById("arriveBtnText");

    if (isLast) {
      arriveBtn.style.display = "none";
      restartBtn.style.display = "block";
    } else {
      arriveBtn.style.display = "flex";
      restartBtn.style.display = "none";
      arriveBtnText.textContent = "Arrived at " + stops[next].name;
    }
  }

  function markArrived() {
    if (currentStop < stops.length - 1) {
      currentStop++;
      pushStop(currentStop);
      renderPanel();
    }
  }

  function restartLoop() {
    currentStop = 0;
    pushStop(currentStop);
    renderPanel();
  }

  function setMode(m) {
    mode = m;
    document.getElementById("btnManual").className = "mode-btn" + (m === "manual" ? " active" : "");
    document.getElementById("btnGps").className = "mode-btn" + (m === "gps" ? " active" : "");

    const gpsStatus = document.getElementById("gpsStatus");
    const arriveBtn = document.getElementById("arriveBtn");

    if (m === "gps") {
      gpsStatus.style.display = "flex";
      arriveBtn.disabled = true;
      arriveBtn.style.opacity = "0.4";
      startGps();
    } else {
      gpsStatus.style.display = "none";
      arriveBtn.disabled = false;
      arriveBtn.style.opacity = "1";
      stopGps();
    }
  }

  function startGps() {
    if (!navigator.geolocation) {
      document.getElementById("gpsTitle").textContent = "GPS not available on this device";
      document.getElementById("gpsSub").textContent = "Please use Manual mode instead";
      return;
    }
    document.getElementById("gpsTitle").textContent = "Acquiring GPS signal...";
    document.getElementById("gpsSub").textContent = "Keep this page open while driving";

    gpsInterval = setInterval(() => {
      navigator.geolocation.getCurrentPosition(
        pos => {
          const nearest = getNearestStop(pos.coords.latitude, pos.coords.longitude);
          document.getElementById("gpsTitle").textContent = "GPS active — " + stops[nearest].name;
          document.getElementById("gpsSub").textContent = "Accuracy: ±" + Math.round(pos.coords.accuracy) + "m";
          if (nearest !== currentStop) {
            currentStop = nearest;
            pushStop(currentStop);
            renderPanel();
          }
        },
        () => {
          document.getElementById("gpsTitle").textContent = "GPS signal lost";
          document.getElementById("gpsSub").textContent = "Retrying... keep page open";
        },
        { enableHighAccuracy: true, timeout: 7000 }
      );
    }, 8000);
  }

  function stopGps() {
    if (gpsInterval) { clearInterval(gpsInterval); gpsInterval = null; }
  }

  function getNearestStop(lat, lng) {
    let nearest = 0, minDist = Infinity;
    stopCoords.forEach((s, i) => {
      const d = Math.sqrt(Math.pow(lat - s.lat, 2) + Math.pow(lng - s.lng, 2));
      if (d < minDist) { minDist = d; nearest = i; }
    });
    return nearest;
  }

  loadCurrentStop();
  renderPanel();
</script>
</body>
</html>
