<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Resort Shuttle Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0faf5;
      color: #1a1a1a;
      min-height: 100vh;
    }

    .header {
      background: linear-gradient(135deg, #0f6e56, #1D9E75);
      color: white;
      padding: 20px;
      text-align: center;
    }
    .header h1 { font-size: 20px; font-weight: 700; letter-spacing: 0.3px; }
    .header p { font-size: 13px; opacity: 0.85; margin-top: 4px; }

    .live-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(255,255,255,0.2);
      border-radius: 99px;
      padding: 4px 12px;
      font-size: 12px;
      font-weight: 600;
      margin-top: 10px;
    }
    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #a8f0c6;
      animation: blink 1.4s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .eta-card {
      background: white;
      margin: 16px;
      border-radius: 14px;
      padding: 18px 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .eta-left {}
    .eta-mins { font-size: 38px; font-weight: 700; color: #0f6e56; line-height: 1; }
    .eta-mins span { font-size: 18px; font-weight: 400; color: #666; }
    .eta-label { font-size: 13px; color: #666; margin-top: 4px; }
    .eta-stop { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-top: 2px; }

    .shuttle-icon {
      width: 56px; height: 56px;
      background: #e1f5ee;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px;
    }

    .status-bar {
      margin: 0 16px 16px;
      background: #e1f5ee;
      border-left: 3px solid #1D9E75;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 13px;
      color: #0f6e56;
      font-weight: 500;
    }

    .section-title {
      font-size: 12px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin: 0 16px 8px;
    }

    .stops-card {
      background: white;
      margin: 0 16px 16px;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    }

    .stop-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 13px 16px;
      border-bottom: 1px solid #f3f3f3;
      transition: background 0.2s;
    }
    .stop-row:last-child { border-bottom: none; }
    .stop-row.current { background: #f0faf5; }

    .stop-indicator {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      flex-shrink: 0;
    }
    .stop-circle {
      width: 22px; height: 22px;
      border-radius: 50%;
      background: #e5e5e5;
      border: 2px solid #ddd;
      display: flex; align-items: center; justify-content: center;
      font-size: 10px;
      font-weight: 700;
      color: #999;
      flex-shrink: 0;
    }
    .stop-circle.done { background: #1D9E75; border-color: #1D9E75; color: white; }
    .stop-circle.current { background: #185FA5; border-color: #185FA5; color: white; box-shadow: 0 0 0 3px #b5d4f4; }
    .stop-line {
      width: 2px;
      height: 10px;
      background: #e5e5e5;
      margin: 1px 0;
    }
    .stop-line.done { background: #1D9E75; }

    .stop-info { flex: 1; }
    .stop-name { font-size: 14px; font-weight: 500; color: #1a1a1a; }
    .stop-sub { font-size: 12px; color: #999; margin-top: 1px; }

    .stop-badge {
      font-size: 12px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 99px;
      flex-shrink: 0;
    }
    .badge-done { background: #f0f0f0; color: #999; }
    .badge-current { background: #185FA5; color: white; }
    .badge-next { background: #e1f5ee; color: #0f6e56; }
    .badge-upcoming { background: #f5f5f5; color: #888; }

    .map-card {
      background: white;
      margin: 0 16px 16px;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      padding: 16px;
    }
    .map-wrap {
      background: #d4ede0;
      border-radius: 10px;
      position: relative;
      height: 180px;
      overflow: hidden;
    }
    .map-route {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
    }
    .map-shuttle {
      position: absolute;
      font-size: 22px;
      transform: translate(-50%, -50%);
      transition: left 1.5s ease-in-out, top 1.5s ease-in-out;
      z-index: 10;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
    }

    .last-updated {
      text-align: center;
      font-size: 11px;
      color: #bbb;
      padding: 8px 0 20px;
    }

    .offline-banner {
      display: none;
      background: #fff3cd;
      border-left: 3px solid #f0a500;
      margin: 0 16px 12px;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 13px;
      color: #7a5800;
    }
  </style>
</head>
<body>

<div class="header">
  <h1> Marbrisa</h1>
  <p>Shuttle</p>
  <div class="live-pill"><div class="live-dot"></div> Live Tracking</div>
</div>

<div style="height:16px"></div>

<div class="offline-banner" id="offlineBanner">
  ⚠️ Connection lost — retrying...
</div>

<div class="eta-card">
  <div class="eta-left">
    <div class="eta-mins" id="etaMins">—<span> min</span></div>
    <div class="eta-label">to next stop</div>
    <div class="eta-stop" id="etaStop">Loading...</div>
  </div>
  <div class="shuttle-icon">🚐</div>
</div>

<div class="status-bar" id="statusBar">Connecting to shuttle...</div>

<p class="section-title">Route Map</p>
<div class="map-card">
  <div class="map-wrap">
    <svg class="map-route" id="mapSvg" viewBox="0 0 320 180" preserveAspectRatio="none">
      <polyline id="routeFull" points="" fill="none" stroke="#a8d5be" stroke-width="3" stroke-dasharray="6,4"/>
      <polyline id="routeDone" points="" fill="none" stroke="#1D9E75" stroke-width="3"/>
    </svg>
    <div class="map-shuttle" id="mapShuttle" style="left:10%;top:50%">🚐</div>
  </div>
</div>

<p class="section-title">All Stops</p>
<div class="stops-card" id="stopsList"></div>

<div class="last-updated" id="lastUpdated">Waiting for data...</div>

<script>
  const FIREBASE_URL = "https://resort-shuttle-try-default-rtdb.firebaseio.com/shuttle.json";

  const stops = [
    { name: "Main Lobby",        sub: "Main entrance & drop-off" },
    { name: "Pool & Cabanas",    sub: "Poolside bar & loungers"  },
    { name: "Spa & Wellness",    sub: "Building B, north side"   },
    { name: "Beach Club",        sub: "Oceanfront access"        },
    { name: "Water Sports",      sub: "Kayaks & paddleboards"    },
    { name: "Garden Villas",     sub: "Rooms 200–350"            },
    { name: "Restaurant Row",    sub: "Dining & beach bar"       },
  ];

  const stopPositions = [
    { x: 10, y: 50 }, { x: 25, y: 20 }, { x: 45, y: 10 },
    { x: 65, y: 18 }, { x: 80, y: 40 }, { x: 75, y: 70 },
    { x: 50, y: 80 },
  ];

  const loopMinutes = [0, 2, 4, 7, 10, 13, 16];

  let currentStop = 0;

  function minsToNext(from) {
    const gap = loopMinutes[1] - loopMinutes[0];
    return gap;
  }

  function etaFromCurrent(stopIndex) {
    if (stopIndex <= currentStop) {
      const totalLoop = loopMinutes[loopMinutes.length - 1] + 2;
      return totalLoop - loopMinutes[currentStop] + loopMinutes[stopIndex];
    }
    return loopMinutes[stopIndex] - loopMinutes[currentStop];
  }

  function buildMap() {
    const pts = stopPositions.map(p => (p.x * 3.2) + "," + (p.y * 1.8)).join(" ");
    const closed = pts + " " + (stopPositions[0].x * 3.2) + "," + (stopPositions[0].y * 1.8);
    document.getElementById("routeFull").setAttribute("points", closed);
  }

  function updateUI(stop) {
    currentStop = stop;
    const next = (stop + 1) % stops.length;
    const mins = loopMinutes[1] - loopMinutes[0];

    document.getElementById("etaMins").innerHTML = mins + "<span> min</span>";
    document.getElementById("etaStop").textContent = stops[next].name;
    document.getElementById("statusBar").textContent =
      "🚐 Shuttle is at " + stops[stop].name;

    const donePts = stopPositions.slice(0, stop + 1).map(p =>
      (p.x * 3.2) + "," + (p.y * 1.8)).join(" ");
    document.getElementById("routeDone").setAttribute("points", donePts);

    const pos = stopPositions[stop];
    document.getElementById("mapShuttle").style.left = pos.x + "%";
    document.getElementById("mapShuttle").style.top = pos.y + "%";

    const list = document.getElementById("stopsList");
    list.innerHTML = stops.map((s, i) => {
      let circleClass = "stop-circle";
      let badgeClass = "stop-badge";
      let badgeText = "";
      let rowClass = "stop-row";

      if (i < stop) {
        circleClass += " done"; badgeClass += " badge-done"; badgeText = "✓ Done";
      } else if (i === stop) {
        circleClass += " current"; badgeClass += " badge-current";
        badgeText = "Here now"; rowClass += " current";
      } else if (i === next) {
        badgeClass += " badge-next"; badgeText = "~" + mins + " min";
      } else {
        badgeClass += " badge-upcoming";
        badgeText = "~" + etaFromCurrent(i) + " min";
      }

      const showLine = i < stops.length - 1;
      return `<div class="${rowClass}">
        <div class="stop-indicator">
          <div class="${circleClass}">${i + 1}</div>
          ${showLine ? `<div class="stop-line${i < stop ? ' done' : ''}"></div>` : ""}
        </div>
        <div class="stop-info">
          <div class="stop-name">${s.name}</div>
          <div class="stop-sub">${s.sub}</div>
        </div>
        <div class="${badgeClass}">${badgeText}</div>
      </div>`;
    }).join("");

    const now = new Date();
    document.getElementById("lastUpdated").textContent =
      "Last updated " + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function fetchLocation() {
    fetch(FIREBASE_URL)
      .then(r => r.json())
      .then(data => {
        document.getElementById("offlineBanner").style.display = "none";
        if (data && typeof data.stop === "number") updateUI(data.stop);
      })
      .catch(() => {
        document.getElementById("offlineBanner").style.display = "block";
      });
  }

  buildMap();
  updateUI(0);
  fetchLocation();
  setInterval(fetchLocation, 5000);
</script>
</body>
</html>
